{% set name = "databricks-sql-connector" %}
{% set version = "4.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ name.split('-')[0] }}/{{ name.split('-')[0] }}-{{ name.split('-')[1] }}-python/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 40b91f6ec4294aa1c1ecc92b2611e08eebf8c0d9c81bf05d8ee824d320770a2f

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: True  # [py<38]

requirements:
  host:
    - python
    - pip
    - poetry-core >=1.0.0
  run:
    - python
    - thrift >=0.16.0,<0.21.0
    - pandas >=1.2.5,<2.3.0  # [py<313]
    - pandas >=2.2.3,<2.3.0  # [py>=313]
    - lz4 >=4.0.2,<5.0.0
    - requests >=2.18.1,<3.0.0
    - oauthlib >=3.1.0,<4.0.0
    - openpyxl >=3.0.10,<4.0.0
    - urllib3 >=1.26
    - python-dateutil >=2.8.0,<3.0.0
    - pyjwt >=2.0.0,<3.0.0
  run_constrained:
    - pyarrow >=14.0.1  # [py>=38 and py<313]
    - pyarrow >=18.0.0  # [py>=313]
    - requests-kerberos >=0.15.0,<1.0.0

test:
  source_files:
    - tests
  imports:
    - databricks
    - databricks.sql
    - databricks.sql.auth
    - databricks.sql.backend
    - databricks.sql.cloudfetch
    - databricks.sql.common
    - databricks.sql.exc
    - databricks.sql.experimental
    - databricks.sql.parameters
    - databricks.sql.result_set
    - databricks.sql.session
    - databricks.sql.telemetry
    - databricks.sql.thrift_api
    - databricks.sql.types
    - databricks.sql.utils
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -vv tests/unit -k "not test_init_file_contents"
  requires:
    - pip
    - python
    - pytest >=7.1.2,<8.0.0
    - pyarrow

about:
  home: https://github.com/databricks/databricks-sql-python
  summary: Databricks SQL Connector for Python
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://docs.databricks.com/dev-tools/python-sql-connector.html
  dev_url: https://github.com/databricks/databricks-sql-python
  description: |
    The Databricks SQL Connector for Python allows you to develop Python applications that connect to
    Databricks clusters and SQL warehouses. It is a Thrift-based client with no dependencies on ODBC 
    or JDBC. It conforms to the Python DB API 2.0 specification.

extra:
  recipe-maintainers:
    - xylar
